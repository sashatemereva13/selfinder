name: Docker Build Publish Deploy

on:
  # Create a docker image at every pull request
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/selfinder:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/selfinder:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            IMAGE=ghcr.io/${{ github.repository_owner }}/selfinder:${{ github.sha }}

            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GHCR_PAT }}

            docker pull $IMAGE

            docker stop selfinder || true
            docker rm selfinder || true

            docker run -d \
              --name selfinder \
              -p 8080:80 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/selfinder:${{ github.sha }}
